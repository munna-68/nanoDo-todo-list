<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nanoDo</title>
  </head>
  <body>
    <!-- Preloader -->
    <div id="preloader" class="preloader">
      <div class="spinner"></div>
    </div>

    <div class="app-container">
      <aside class="left-sidebar">
        <div class="left-sidebar-container">
          <div class="brand-header">
            <div class="logo-wrapper">
              <img
                class="logo"
                src="./assets/images/logo.png"
                alt="NanoDo logo"
              />
            </div>
          </div>

          <nav class="project-navigation">
            <h2 class="section-label">Projects</h2>

            <div class="project-list-container">
              <button class="btn-new-project">
                <img
                  class="icon-plus"
                  src="./assets/images/plus-icon.png"
                  alt="plus-icon"
                />
                Add Project
              </button>

              <div class="form-group add-project-form hidden">
                <input
                  type="text"
                  class="input-text"
                  placeholder="Name of Task"
                />
              </div>

              <ul class="project-list">
                <!-- projects will be injected here -->
              </ul>
            </div>
          </nav>
        </div>
      </aside>

      <main class="main-content">
        <header class="project-header">
          <h2 class="current-project-title">
            <span class="icon-hash">#</span> Default Project
          </h2>
          <div class="project-actions">
            <p class="action-text">Delete Project</p>
            <button class="btn-icon-delete" aria-label="Delete Project">
              <img
                src="./assets/images/dlt-project-icon.png"
                alt="delete project icon"
              />
            </button>
          </div>
        </header>

        <div class="main-content-container">
          <div class="todo-container">
            <div class="todo-element-container">
              <div class="task-input-placeholder">
                <img
                  class="icon-plus"
                  src="./assets/images/plus-icon.png"
                  alt="plus-icon"
                />
                Add Task
              </div>

              <div class="task-list">
                <!-- tasks will be injected here -->
              </div>
            </div>
          </div>

          <aside class="input-panel pannel hidden">
            <button class="btn-close-panel" aria-label="Close panel">
              <img
                src="./assets/images/cross-icon.png"
                alt="close panel icon"
              />
            </button>

            <form class="editor-form">
              <div class="form-group">
                <input
                  type="text"
                  class="input-text"
                  placeholder="Name of Task"
                />
              </div>

              <div class="form-group description">
                <textarea
                  class="input-textarea"
                  placeholder="Description"
                  rows="4"
                ></textarea>
              </div>

              <div
                class="form-group priority-select-group"
                data-priority-select
              >
                <div
                  class="custom-select-trigger priority-select-trigger"
                  data-priority-trigger
                  aria-expanded="false"
                >
                  <div class="select-label">
                    <div
                      class="color-dot color-dot--green"
                      data-priority-dot
                    ></div>
                    <p class="input-txt" data-priority-label>Low Priority</p>
                  </div>
                  <img
                    src="./assets/images/dropdown-icon.png"
                    alt="dropdown icon"
                  />
                </div>

                <ul
                  class="priority-dropdown hidden"
                  data-priority-menu
                  aria-hidden="true"
                >
                  <li>
                    <button
                      type="button"
                      class="priority-option"
                      data-priority-option="high"
                    >
                      <span class="color-dot color-dot--red"></span>
                      <span class="priority-option-text">High Priority</span>
                    </button>
                  </li>
                  <li>
                    <button
                      type="button"
                      class="priority-option"
                      data-priority-option="medium"
                    >
                      <span class="color-dot color-dot--yellow"></span>
                      <span class="priority-option-text">Medium Priority</span>
                    </button>
                  </li>
                  <li>
                    <button
                      type="button"
                      class="priority-option is-selected"
                      data-priority-option="low"
                    >
                      <span class="color-dot color-dot--green"></span>
                      <span class="priority-option-text">Low Priority</span>
                    </button>
                  </li>
                </ul>
              </div>

              <div class="form-group">
                <div class="date-picker-field">
                  <div
                    class="date-picker-trigger"
                    data-date-trigger
                    role="button"
                    tabindex="0"
                    aria-expanded="false"
                  >
                    <img
                      src="./assets/images/calender-icon.png"
                      class="calender-icon"
                      alt="calender icon"
                    />
                    <p class="input-txt">
                      <span class="date-picker-label" data-date-label>
                        Set Date
                      </span>
                    </p>
                  </div>

                  <input type="hidden" data-due-date-input />

                  <div
                    class="date-picker-popup hidden"
                    data-date-picker
                    aria-hidden="true"
                  >
                    <div class="date-picker-header">
                      <button type="button" class="date-nav-btn" data-date-prev>
                        &lt;
                      </button>
                      <span class="date-month-label" data-date-month-label>
                        January 2026
                      </span>
                      <button type="button" class="date-nav-btn" data-date-next>
                        &gt;
                      </button>
                    </div>
                    <div class="date-weekday-row">
                      <span>Su</span>
                      <span>Mo</span>
                      <span>Tu</span>
                      <span>We</span>
                      <span>Th</span>
                      <span>Fr</span>
                      <span>Sa</span>
                    </div>
                    <div class="date-grid" data-date-grid></div>
                  </div>
                </div>
              </div>

              <div class="editor-footer-actions">
                <button type="button" class="btn-save">Add Task</button>
                <button
                  type="button"
                  class="dlt-btn btn-delete-task"
                  id="cancelBtn"
                >
                  Cancel
                </button>
              </div>
            </form>
          </aside>

          <aside class="editor-panel pannel hidden">
            <button class="btn-close-panel" aria-label="Close panel">
              <img
                src="./assets/images/cross-icon.png"
                alt="close panel icon"
              />
            </button>

            <form class="editor-form">
              <label class="input-label">Name of task:</label>
              <div class="form-group">
                <input
                  type="text"
                  class="input-field shadow-box"
                  value="Marry Her"
                />
              </div>

              <label class="input-label">Description</label>
              <div class="form-group">
                <textarea class="textarea-field" rows="5">
I need to marry her ASAP</textarea
                >
              </div>

              <label class="input-label">Priority Level:</label>
              <div
                class="form-group priority-select-group"
                data-priority-select
              >
                <div
                  class="custom-select custom-select-trigger priority-select-trigger"
                  data-priority-trigger
                  aria-expanded="false"
                >
                  <div class="select-value">
                    <div
                      class="color-dot color-dot--green"
                      data-priority-dot
                    ></div>
                    <p class="input-txt" data-priority-label>Low Priority</p>
                  </div>
                  <img
                    src="./assets/images/dropdown-icon.png"
                    alt="dropdown icon"
                  />
                </div>

                <ul
                  class="priority-dropdown hidden"
                  data-priority-menu
                  aria-hidden="true"
                >
                  <li>
                    <button
                      type="button"
                      class="priority-option"
                      data-priority-option="high"
                    >
                      <span class="color-dot color-dot--red"></span>
                      <span class="priority-option-text">High Priority</span>
                    </button>
                  </li>
                  <li>
                    <button
                      type="button"
                      class="priority-option"
                      data-priority-option="medium"
                    >
                      <span class="color-dot color-dot--yellow"></span>
                      <span class="priority-option-text">Medium Priority</span>
                    </button>
                  </li>
                  <li>
                    <button
                      type="button"
                      class="priority-option is-selected"
                      data-priority-option="low"
                    >
                      <span class="color-dot color-dot--green"></span>
                      <span class="priority-option-text">Low Priority</span>
                    </button>
                  </li>
                </ul>
              </div>

              <label class="input-label">Due Date:</label>
              <div class="form-group">
                <div class="date-picker-field">
                  <div
                    class="date-picker-display"
                    data-date-trigger
                    role="button"
                    tabindex="0"
                    aria-expanded="false"
                  >
                    <img
                      src="./assets/images/calender-icon.png"
                      class="calender-icon"
                      alt="calender icon"
                    />
                    <span class="date-text" data-date-label>Set Date</span>
                  </div>

                  <input type="hidden" data-due-date-input />

                  <div
                    class="date-picker-popup hidden"
                    data-date-picker
                    aria-hidden="true"
                  >
                    <div class="date-picker-header">
                      <button type="button" class="date-nav-btn" data-date-prev>
                        &lt;
                      </button>
                      <span class="date-month-label" data-date-month-label>
                        January 2026
                      </span>
                      <button type="button" class="date-nav-btn" data-date-next>
                        &gt;
                      </button>
                    </div>
                    <div class="date-weekday-row">
                      <span>Su</span>
                      <span>Mo</span>
                      <span>Tu</span>
                      <span>We</span>
                      <span>Th</span>
                      <span>Fr</span>
                      <span>Sa</span>
                    </div>
                    <div class="date-grid" data-date-grid></div>
                  </div>
                </div>
              </div>

              <div class="panel-actions">
                <button type="button" class="btn-save">Save Changes</button>
                <button type="button" class="dlt-btn">Delete</button>
              </div>
            </form>
          </aside>

          <aside class="task-details-panel pannel hidden">
            <button class="btn-close-panel" aria-label="Close panel">
              <img
                src="./assets/images/cross-icon.png"
                alt="close panel icon"
              />
            </button>

            <div class="details-content">
              <div class="info-group">
                <span class="info-label">Name of task:</span>
                <h3 class="info-value title-text">Marry Her</h3>
              </div>

              <div class="info-group">
                <span class="info-label">Description</span>
                <p class="info-value description-text">
                  I need to marry her ASAP
                </p>
              </div>

              <div class="info-group">
                <span class="info-label">Priority Level:</span>
                <div class="info-value priority-display">
                  <div class="color-dot color-dot--red"></div>
                  <span class="text">High</span>
                </div>
              </div>

              <div class="info-group">
                <span class="info-label">Due Date:</span>
                <div class="info-value date-display">
                  <img
                    src="./assets/images/calender-icon.png"
                    class="calender-icon"
                    alt="calender icon"
                  />
                  <span class="text">24/05/25</span>
                </div>
              </div>
              <div class="panel-actions">
                <button type="button" class="btn-edit btn-save">Edit</button>
                <button type="button" class="btn-delete dlt-btn">Delete</button>
              </div>
            </div>
          </aside>
        </div>
      </main>
    </div>
  </body>
</html>
